<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <!-- Load fonts asynchronously so they never block rendering or JS execution -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Spline+Sans+Mono:wght@400;500;600&family=Syne:wght@400;500;600;700&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
  <style>
    /* ── Reset & base ───────────────────────────────────────────── */
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --primary-50:  #E8F0F7;
      --primary-100: #D1E0EE;
      --primary-200: #A3C1DD;
      --primary-300: #75A2CC;
      --primary-400: #4783BB;
      --primary-500: #4074A8;
      --primary-600: #336086;
      --primary-700: #264864;
      --primary-800: #1A3042;
      --primary-900: #0D1821;

      --accent-50:  #FEF9E7;
      --accent-100: #FDF3CF;
      --accent-200: #FBE79F;
      --accent-300: #F9DB6F;
      --accent-400: #F7CF3F;
      --accent-500: #F2A918;
      --accent-600: #C28713;
      --accent-700: #91650E;
      --accent-800: #61430A;
      --accent-900: #302205;

      --gray-50:  #F9FAFB;
      --gray-100: #F3F4F6;
      --gray-200: #E5E7EB;
      --gray-300: #D1D5DB;
      --gray-400: #9CA3AF;
      --gray-500: #6B7280;
      --gray-600: #4B5563;
      --gray-700: #374151;
      --gray-800: #1F2937;
      --gray-900: #111827;
    }

    body {
      font-family: 'Spline Sans Mono', 'SF Mono', 'Fira Code', Consolas, monospace;
      font-size: 12px;
      color: var(--gray-800);
      /* Match the web app's radial blue gradient */
      background: radial-gradient(circle at 50% 30%, #ffffff, #fefeff, #f6f9fc, #e2ecf4, #d5e2ef, #d1e0ee, #d1e0ee, #cddded, #c0d4e8, #acc7e0, #a4c2dd, #a3c1dd);
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* ── Header / Controls ──────────────────────────────────────── */
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      background: #ffffff;
      border-bottom: 1px solid var(--gray-200);
      flex-shrink: 0;
    }

    .logo-mark {
      display: flex;
      align-items: center;
      gap: 8px;
      text-decoration: none;
      flex-shrink: 0;
    }

    .logo-mark svg {
      height: 18px;
      width: auto;
      flex-shrink: 0;
    }

    .controls {
      display: flex;
      align-items: center;
      gap: 8px;
      /* Push the whole controls group to the far right of the header row */
      margin-left: auto;
    }

    .controls label {
      color: var(--gray-500);
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-weight: 500;
    }

    .controls select {
      background: #ffffff;
      color: var(--gray-700);
      border: 1px solid var(--gray-300);
      border-radius: 4px;
      padding: 4px 6px;
      font-family: inherit;
      font-size: 11px;
      cursor: pointer;
      transition: border-color 0.15s;
    }

    .controls select:focus {
      outline: none;
      border-color: var(--primary-500);
    }

    /* ── Buttons ─────────────────────────────────────────────────── */
    /* Primary = blue, mirrors the web app's primary Button variant
       (bg-primary-500, hover-600, active-700, disabled-300). */
    .btn-primary {
      background: var(--primary-500);
      color: #ffffff;
      border: none;
      border-radius: 6px;
      padding: 7px 14px;
      font-family: inherit;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
      white-space: nowrap;
    }

    .btn-primary:hover:not(:disabled) {
      background: var(--primary-600);
    }

    .btn-primary:active:not(:disabled) {
      background: var(--primary-700);
    }

    .btn-primary:disabled {
      background: var(--primary-300);
      cursor: not-allowed;
    }

    /* Accent = the lighter brand yellow used for "Download All". */
    .btn-accent {
      background: var(--accent-400);
      color: var(--gray-900);
      border: none;
      border-radius: 6px;
      padding: 7px 14px;
      font-family: inherit;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
      white-space: nowrap;
    }

    .btn-accent:hover:not(:disabled) {
      background: var(--accent-500);
    }

    .btn-accent:active:not(:disabled) {
      background: var(--accent-600);
    }

    .btn-accent:disabled {
      background: var(--accent-200);
      cursor: not-allowed;
    }

    /* ── Status line ─────────────────────────────────────────────── */
    .status-line {
      padding: 7px 16px;
      font-size: 10px;
      color: var(--gray-500);
      background: #ffffff;
      border-bottom: 1px solid var(--gray-200);
      flex-shrink: 0;
      letter-spacing: 0.02em;
    }

    /* ── Progress ─────────────────────────────────────────────────── */
    .progress-area {
      display: none;
      padding: 12px 16px;
      flex-shrink: 0;
    }

    .progress-track {
      width: 100%;
      height: 5px;
      background: var(--gray-200);
      border-radius: 3px;
      overflow: hidden;
    }

    .progress-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--primary-500), var(--primary-400));
      border-radius: 3px;
      transition: width 0.3s ease;
    }

    .progress-text {
      margin-top: 6px;
      font-size: 10px;
      color: var(--gray-500);
    }

    /* ── Results list ─────────────────────────────────────────────── */
    .results-list {
      flex: 1;
      overflow-y: auto;
      padding: 10px 14px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .results-list::-webkit-scrollbar { width: 5px; }
    .results-list::-webkit-scrollbar-track { background: transparent; }
    .results-list::-webkit-scrollbar-thumb {
      background: var(--gray-300);
      border-radius: 3px;
    }

    /* Card-style rows (mirrors the web app queue) so separation reads clearly
       over the gradient instead of relying on a faint divider line. */
    .result-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 10px 12px;
      background: #ffffff;
      border: 1px solid var(--gray-200);
      border-radius: 8px;
      transition: border-color 0.12s;
    }

    .result-row:hover {
      border-color: var(--gray-300);
    }

    .result-info {
      display: flex;
      flex-direction: column;
      gap: 3px;
      flex: 1;
      min-width: 0;
    }

    .result-name {
      font-size: 13px;
      color: var(--gray-800);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-weight: 500;
    }

    .result-meta {
      font-size: 11px;
      color: var(--gray-500);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .result-meta strong {
      color: var(--primary-500);
      font-weight: 600;
    }

    /* Per-row actions: download + remove */
    .result-actions {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-shrink: 0;
    }

    .btn-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 28px;
      height: 28px;
      background: #ffffff;
      color: var(--gray-500);
      border: 1px solid var(--gray-300);
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.12s, border-color 0.12s, color 0.12s;
    }

    .btn-icon svg { width: 14px; height: 14px; display: block; }

    .btn-icon:hover {
      background: var(--gray-50);
      border-color: var(--gray-400);
      color: var(--gray-700);
    }

    /* Remove button turns red on hover */
    .btn-icon.remove-single:hover {
      background: #FEF2F2;
      border-color: #FCA5A5;
      color: #DC2626;
    }

    /* ── Download bar ─────────────────────────────────────────────── */
    .download-bar {
      display: none;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 10px 16px;
      background: #ffffff;
      border-top: 1px solid var(--gray-200);
      flex-shrink: 0;
    }

    .download-summary {
      font-size: 10px;
      color: var(--gray-500);
    }

    .download-summary strong {
      color: var(--primary-500);
    }

    /* ── Empty state ──────────────────────────────────────────────── */
    /* Mirrors the web app's pre-compression screen: instructional copy
       centered, smoosh wordmark anchored at the bottom as a footer. */
    .empty-state {
      display: flex;
      flex-direction: column;
      height: 100%;
      text-align: center;
    }

    .empty-state .empty-body {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      padding: 32px 24px;
    }

    .empty-state .empty-title {
      font-family: 'Syne', sans-serif;
      font-size: 26px;
      font-weight: 700;
      color: var(--gray-700);
      letter-spacing: -0.01em;
    }

    .empty-state .empty-sub {
      font-size: 14px;
      line-height: 1.7;
      color: var(--gray-500);
      max-width: 380px;
    }

    .empty-state .empty-sub strong {
      color: var(--primary-600);
      font-weight: 600;
    }

    .empty-state .empty-footer {
      flex-shrink: 0;
      padding: 18px 16px 26px;
      opacity: 0.4;
    }

    .empty-state .empty-footer svg {
      height: 26px;
      width: auto;
    }

    .empty-state .empty-footer .copyright {
      margin-top: 8px;
      font-size: 11px;
      color: var(--gray-500);
      letter-spacing: 0.02em;
    }
  </style>
</head>
<body>

  <!-- Header: logo, selection info, controls, export button -->
  <div class="header">
    <div class="logo-mark">
      <!-- INJECT_LOGO -->
    </div>

    <div class="controls">
      <label for="format-select">Format</label>
      <select id="format-select">
        <option value="WEBP" selected>WebP</option>
        <option value="JPG">JPG</option>
        <option value="PNG">PNG</option>
      </select>

      <label for="scale-select">Scale</label>
      <select id="scale-select">
        <option value="1">1×</option>
        <option value="2" selected>2×</option>
        <option value="3">3×</option>
        <option value="4">4×</option>
      </select>

      <button class="btn-primary" id="export-btn" disabled>Export &amp; Smoosh</button>
    </div>
  </div>

  <!-- Status line — single source of truth for selection count + status -->
  <div class="status-line" id="status-line">No exportable layers selected</div>

  <!-- Progress -->
  <div class="progress-area" id="progress-area">
    <div class="progress-track">
      <div class="progress-bar" id="progress-bar"></div>
    </div>
    <div class="progress-text" id="progress-text">Compressing…</div>
  </div>

  <!-- Scrollable results -->
  <div class="results-list" id="results-list">
    <div class="empty-state">
      <div class="empty-body">
        <div class="empty-title">Select layers to smoosh</div>
        <p class="empty-sub">Choose your format &amp; scale, then click <strong>Export &amp; Smoosh</strong> to compress your selection.</p>
      </div>
      <!-- smoosh wordmark anchored at the bottom, like the web app footer -->
      <div class="empty-footer">
        <!-- INJECT_LOGO_EMPTY -->
        <div class="copyright">© Cake Websites</div>
      </div>
    </div>
  </div>

  <!-- Download bar -->
  <div class="download-bar" id="download-bar">
    <span class="download-summary" id="download-summary"></span>
    <button class="btn-accent" id="download-all-btn">Download All</button>
  </div>

  <!-- Codec scripts: emscripten factories + oxipng wasm-bindgen.
       These define window.__smoosh_mozjpeg_dec, __smoosh_mozjpeg_enc, __smoosh_oxipng
       as inert factory functions. They do NOT instantiate WASM until called. -->
  <!-- INJECT_CODECS -->

  <!-- Main UI bundle -->
  <!-- INJECT_JS -->

</body>
</html>
